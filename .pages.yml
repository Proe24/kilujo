# Pages CMS — kilujo.com
# https://pagescms.org/docs/configuration/
#
# Four editable surfaces:
#   - Journal: unified feed (writing / video / gaming)
#   - Posts:   short-form, instagram-style feed (gianna / stephen / kilo / kujo)
#   - Projects: small things we've made
#   - About: a single markdown page
#
# Photos are NOT managed here — they come from Flickr at build time
# (src/lib/flickr.ts) and live entirely outside the CMS.

# ─── Media stores ────────────────────────────────────────────────────────
# Four named stores so each surface uploads into a distinct subfolder
# of /public/uploads/. Pages CMS does not support dynamic per-entry
# subfolders, so journal+posts images all land flat in one folder each.
# Filenames are kept unique via `rename: safe`.
media:
  - name: journal
    label: Journal images
    input: public/uploads/journal
    output: /uploads/journal
    extensions: [jpg, jpeg, png, webp, gif]
    rename: safe
  - name: posts
    label: Post images
    input: public/uploads/posts
    output: /uploads/posts
    extensions: [jpg, jpeg, png, webp, gif]
    rename: safe
  - name: projects
    label: Project images
    input: public/uploads/projects
    output: /uploads/projects
    extensions: [jpg, jpeg, png, webp, gif, svg]
    rename: safe
  - name: about
    label: About image
    input: public/uploads/about
    output: /uploads/about
    extensions: [jpg, jpeg, png, webp]
    rename: safe

# ─── Content ─────────────────────────────────────────────────────────────
content:

  # ── Journal: unified writing / video / gaming feed ────────────────────
  - name: journal
    label: Journal
    type: collection
    path: src/content/journal
    format: yaml-frontmatter
    filename:
      template: "{fields.title}.md"
    view:
      primary: title
      sort: date
      order: desc
      fields: [title, kind, date, author]
    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: date
        label: Date
        type: date
        required: true
        default: now

      - name: author
        label: Author
        type: select
        required: true
        options:
          values:
            - { name: "Gianna Yim",        label: "Gianna Yim" }
            - { name: "Stephen Underwood", label: "Stephen Underwood" }

      - name: kind
        label: Kind
        description: >-
          Writing = a regular post · Video = embeds a YouTube clip · Gaming = adds
          game/rating/platform/hours fields. The kind-specific fields below are
          all optional — only fill in the ones that match.
        type: select
        required: true
        default: writing
        options:
          values:
            - { name: writing, label: Writing }
            - { name: video,   label: Video   }
            - { name: gaming,  label: Gaming  }

      - name: excerpt
        label: Excerpt
        description: One-line preview shown on the Journal list and the home page.
        type: string

      - name: cover
        label: Cover image
        type: image
        options:
          media: journal

      - name: coverAlt
        label: Cover image alt text
        description: Describes the cover for screen readers. Leave blank if the image is purely decorative.
        type: string

      - name: coverAspect
        label: Cover crop
        description: >-
          How to display the cover photo. "Natural" keeps the image's own
          proportions (no crop). The other options crop the photo to that
          shape — portrait variants are taller than wide; landscape variants
          are wider than tall.
        type: select
        default: natural
        options:
          values:
            - { name: natural, label: "Natural (no crop)" }
            - { name: "16-9",  label: "Wide — 16:9 (landscape)" }
            - { name: "9-16",  label: "Tall — 9:16 (portrait)" }
            - { name: "4-3",   label: "Landscape — 4:3" }
            - { name: "3-4",   label: "Portrait — 3:4" }
            - { name: "1-1",   label: "Square — 1:1" }

      - name: tags
        label: Tags
        type: string
        list: true

      # ── Kind: video ─────────────────────────────────────────────────
      - name: youtubeId
        label: YouTube video ID
        description: 'Only for kind = Video. Just the ID (e.g. "wpQQxUeekks"), not the full URL.'
        type: string

      # ── Kind: gaming ────────────────────────────────────────────────
      - name: game
        label: Game
        description: Only for kind = Gaming.
        type: string

      - name: rating
        label: Rating
        description: Only for kind = Gaming. 1 to 5 stars.
        type: number
        options:
          min: 1
          max: 5
          step: 1

      - name: platform
        label: Platform
        description: Only for kind = Gaming. e.g. "PC", "Switch".
        type: string

      - name: hours
        label: Hours played
        description: Only for kind = Gaming.
        type: number
        options:
          min: 0
          step: 0.5

      - name: gallery
        label: Gallery
        description: Shown below the body as a responsive grid.
        type: image
        options:
          media: journal
          multiple: true

      - name: flickrPhotos
        label: Flickr photos
        description: >-
          Full-quality photos pulled from Flickr at build time — use these for
          camera shots that are too big for the CMS upload limit. Paste the
          numeric photo ID from the Flickr URL (e.g. for
          flickr.com/photos/you/54321 the ID is 54321). See
          docs/adding-photos.md for the full walkthrough.
        type: object
        list: true
        fields:
          - name: id
            label: Flickr photo ID
            type: string
            required: true
          - name: caption
            label: Caption
            description: Optional. Overrides the title from Flickr for display.
            type: string
          - name: size
            label: Display size
            description: '"Large" is ~1024px on the longest side (good for most posts). "Large 1600" is ~1600px — heavier, use sparingly.'
            type: select
            default: large
            options:
              values:
                - { name: large,     label: "Large (~1024px)" }
                - { name: large1600, label: "Large 1600 (~1600px)" }

      - name: body
        label: Body
        description: 'The post itself. Supports headings (## ###), paragraphs, and blockquotes (> ...).'
        type: rich-text

  # ── Posts: short-form, instagram-style feed ───────────────────────────
  # Four "accounts" share one feed (gianna / stephen / kilo / kujo). The
  # dogs are first-class authors — their avatars come from DogAvatars.astro.
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-{fields.author}.md"
    view:
      primary: caption
      sort: date
      order: desc
      fields: [author, kind, date, location]
    fields:
      - name: author
        label: Account
        description: Whose voice this post is in. The dogs each have their own account.
        type: select
        required: true
        options:
          values:
            - { name: gianna,  label: "@gianna — Gianna Yim" }
            - { name: stephen, label: "@stephen — Stephen Underwood" }
            - { name: kilo,    label: "@kilo — Kilo (shiba)" }
            - { name: kujo,    label: "@kujo — Kujo (jindo mix)" }

      - name: date
        label: Date
        description: When this post was written. Drives the timestamp shown on the card and the feed sort order.
        type: date-time
        required: true
        default: now

      - name: kind
        label: Kind
        description: 'Photo (one or many images) or Video (still poster + optional YouTube id).'
        type: select
        required: true
        default: photo
        options:
          values:
            - { name: photo, label: Photo }
            - { name: video, label: Video }

      - name: caption
        label: Caption
        description: 'Short, instagram-length. One or two sentences. Plain text — markdown not rendered.'
        type: text
        required: true

      - name: images
        label: Images
        description: >-
          One photo for a single-image post; two or more to enable the
          carousel. Video posts use just one (the poster frame).
        type: image
        required: true
        options:
          media: posts
          multiple: true

      - name: location
        label: Location
        description: 'Free text — "Uruma, Okinawa", "Couch", "Front window". Leave blank to omit the pin.'
        type: string

      - name: tags
        label: Hashtags
        description: 'With or without the # — it gets added automatically. Each tag becomes a filter link.'
        type: string
        list: true

      # ── Kind: video ─────────────────────────────────────────────────
      - name: youtubeId
        label: YouTube video ID
        description: 'Only for kind = Video. Just the ID (e.g. "wpQQxUeekks"), not the full URL. Leave blank for a non-YouTube clip.'
        type: string

      - name: duration
        label: Duration label
        description: 'Only for kind = Video. Cosmetic — e.g. "0:36". Shown on the still frame.'
        type: string

      - name: draft
        label: Draft (hide from the public feed)
        type: boolean

  # ── Projects: small things we've made ─────────────────────────────────
  - name: projects
    label: Projects
    type: collection
    path: src/content/projects
    format: yaml-frontmatter
    filename:
      template: "{fields.title}.md"
    view:
      primary: title
      sort: year
      order: desc
      fields: [title, kind, status, year]
    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: year
        label: Year
        type: number
        required: true
        options:
          min: 2000
          max: 2100
          step: 1

      - name: kind
        label: Kind
        type: select
        required: true
        options:
          values:
            - { name: Guide,      label: Guide }
            - { name: Experiment, label: Experiment }
            - { name: Tool,       label: Tool }

      - name: status
        label: Status
        type: select
        required: true
        options:
          values:
            - { name: "Live",             label: "Live" }
            - { name: "In progress",      label: "In progress" }
            - { name: "Proof of concept", label: "Proof of concept" }
            - { name: "Archived",         label: "Archived" }

      - name: blurb
        label: Blurb
        description: One short paragraph describing the project.
        type: text
        required: true

      - name: tech
        label: Tech / stack
        type: string
        list: true

      - name: cover
        label: Cover image
        type: image
        options:
          media: projects

      - name: link
        label: Link
        description: 'Internal route (e.g. "/guides/barotrauma/baro_index.html") or external URL.'
        type: string
        required: true

      - name: accent
        label: Accent color
        description: 'Hex color for the card top-edge stripe. Defaults to terracotta (#c08a6f).'
        type: string

      - name: body
        label: Long description (optional)
        type: rich-text

  # ── Home: every editable surface on the home page ────────────────────
  - name: home
    label: Home page
    type: file
    path: src/content/pages/home.md
    format: yaml-frontmatter
    fields:
      - name: heroImage
        label: Hero image
        description: The big photo at the top of the home page.
        type: image
        options:
          media: about

      - name: heroAlt
        label: Hero image alt text
        description: For screen readers. Describe what's in the photo.
        type: string

      - name: heroCaption
        label: Hero caption
        description: 'Small italic note under the photo (e.g. "The four of us, on a hillside, last spring.").'
        type: string

      - name: eyebrow
        label: Eyebrow line
        description: 'Small caps line above the greeting (e.g. "A small notebook · Kept since 2024 · Currently in Okinawa").'
        type: string

      - name: greeting
        label: Greeting
        description: >-
          The big italic intro. Each new line becomes a separate line on the page.
          Use "&" to get the styled ampersand.
        type: text

      - name: intro
        label: Intro paragraph
        description: The paragraph under the greeting.
        type: text

      - name: latelyLabel
        label: Latest-entries eyebrow
        description: 'Eyebrow above the recent posts (e.g. "From the journal · Lately").'
        type: string

      - name: nowMonth
        label: Now-card month (optional)
        description: >-
          Override the "Now · …" eyebrow on the status card. Leave blank to use the
          current month automatically (e.g. "May 2026").
        type: string

      - name: nowBody
        label: Now-card status update
        description: >-
          A short paragraph shown at the bottom of the home page. Leave blank to
          hide the status card entirely.
        type: text

  # ── About: single-file page ───────────────────────────────────────────
  - name: about
    label: About page
    type: file
    path: src/content/pages/about.md
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: hero
        label: Hero image
        type: image
        options:
          media: about

      - name: heroAlt
        label: Hero image alt text
        type: string

      - name: body
        label: Body
        description: 'The page itself. Supports headings, paragraphs, and emphasis.'
        type: rich-text
